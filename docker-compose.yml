# FlowApprove local stack — mirrors prod topology (db + backend + frontend).
#
# Run from this directory (flowapprove-backend/). The frontend build
# context is a relative path to the sibling repo, so the layout must be:
#
#   flowapprove/
#   ├── flowapprove-backend/     <-- you are here
#   └── flowapprove-frontend/frontend/
#
# Usage:
#   docker compose up --build
#   docker compose exec backend python manage.py createsuperuser
#
# Frontend:  http://localhost:5173
# Backend:   http://localhost:8000/api
# Postgres:  localhost:5432 (user/pass: flowapprove / flowapprove)

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: flowapprove
      POSTGRES_USER: flowapprove
      POSTGRES_PASSWORD: flowapprove
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowapprove -d flowapprove"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DJANGO_SECRET_KEY: dev-only-change-me
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "*"
      DB_NAME: flowapprove
      DB_USER: flowapprove
      DB_PASSWORD: flowapprove
      DB_HOST: db
      DB_PORT: "5432"
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media

  frontend:
    build:
      context: ../flowapprove-frontend/frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  db_data:
  media_data:
