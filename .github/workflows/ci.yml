name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev build-essential pkg-config

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Django system check
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: 'True'
        run: python manage.py check --settings=flowapprove_backend.settings_test

      - name: Run tests (SQLite in-memory)
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: 'True'
        run: python manage.py test api --settings=flowapprove_backend.settings_test -v 2

      - name: Validate OpenAPI schema
        env:
          DJANGO_SECRET_KEY: ci-secret
          DJANGO_DEBUG: 'True'
        run: python manage.py spectacular --file schema.yml --validate --settings=flowapprove_backend.settings_test
