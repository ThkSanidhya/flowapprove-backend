<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { max-width: 600px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        .approved { color: green; }
        .rejected { color: red; }
        .footer { margin-top: 20px; font-size: 12px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Document Approval {{ status }}</h2>
        <p>Hello <strong>{{ user_name }}</strong>,</p>
        <p>Document <strong>{{ document_title }}</strong> has been {{ status|lower }} by {{ actor_name }}.</p>
        {% if comment %}
        <p><strong>Comment:</strong> {{ comment }}</p>
        {% endif %}
        <p style="margin: 30px 0;">
            <a href="{{ document_url }}" class="button">View Document</a>
        </p>
        <div class="footer">
            This is an automated message from FlowApprove. Please do not reply.
        </div>
    </div>
</body>
</html>
